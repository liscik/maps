<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <title>MPZP Wrocław – symbole</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />

  <style>
    html, body { margin:0; padding:0; height:100%; }
    #map { width:100%; height:100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script>
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
  center: [17.03, 51.11],
  zoom: 11
});

map.addControl(new maplibregl.NavigationControl());

map.on('load', async () => {

  const geojson = await fetch('./wroclaw_mpzp_symbole.geojson').then(r => r.json());

  map.addSource('symbole', {
    type: 'geojson',
    data: geojson
  });

  // polygony
  map.addLayer({
    id: 'fill',
    type: 'fill',
    source: 'symbole',
    paint: {
      'fill-color': '#4A90E2',
      'fill-opacity': 0.25
    }
  });

  map.addLayer({
    id: 'line',
    type: 'line',
    source: 'symbole',
    paint: {
      'line-color': '#1F4E79',
      'line-width': 1
    }
  });

  // 🔥 LABELKI (same cyfry, bez tła)
  map.addLayer({
    id: 'labels',
    type: 'symbol',
    source: 'symbole',
    layout: {
      'text-field': ['get', 'label'], // <- upewnij się że kolumna to "label"
      'text-size': 11,
      'text-anchor': 'center'
    },
    paint: {
      'text-color': '#111',
      'text-halo-color': '#ffffff',
      'text-halo-width': 1
    }
  });

});
</script>

</body>
</html>
