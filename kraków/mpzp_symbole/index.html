<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <title>MPZP Kraków – W</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />

  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    #map { width: 100%; height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script>
function getViewFromUrl() {
  const params = new URLSearchParams(window.location.search);

  const lng = parseFloat(params.get('lng'));
  const lat = parseFloat(params.get('lat'));
  const z = parseFloat(params.get('z'));

  const hasValidLng = !isNaN(lng) && lng >= -180 && lng <= 180;
  const hasValidLat = !isNaN(lat) && lat >= -90 && lat <= 90;
  const hasValidZoom = !isNaN(z) && z >= 0 && z <= 24;

  return {
    center: (hasValidLng && hasValidLat) ? [lng, lat] : [19.9450, 50.0647],
    zoom: hasValidZoom ? z : 11
  };
}

function updateUrlFromMap(map) {
  const center = map.getCenter();
  const zoom = map.getZoom();

  const params = new URLSearchParams(window.location.search);
  params.set('lng', center.lng.toFixed(6));
  params.set('lat', center.lat.toFixed(6));
  params.set('z', zoom.toFixed(2));

  const newUrl = `${window.location.pathname}?${params.toString()}`;
  window.history.replaceState({}, '', newUrl);
}

function escapeHtml(value) {
  if (value === null || value === undefined) return '';
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function addCoordsToBounds(coords, bounds) {
  if (!Array.isArray(coords)) return;
  if (coords.length >= 2 && typeof coords[0] === 'number' && typeof coords[1] === 'number') {
    bounds.extend(coords);
    return;
  }
  for (const c of coords) {
    addCoordsToBounds(c, bounds);
  }
}

async function loadGeoJsonFile(url) {
  const response = await fetch(url);

  if (!response.ok) {
    throw new Error(`HTTP ${response.status} przy pobieraniu ${url}`);
  }

  const geojson = await response.json();
  delete geojson.crs;

  if (geojson.type !== 'FeatureCollection' || !Array.isArray(geojson.features)) {
    throw new Error(`Plik ${url} nie jest poprawnym FeatureCollection`);
  }

  return geojson;
}

const initialView = getViewFromUrl();

const map = new maplibregl.Map({
  container: 'map',
  style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
  center: initialView.center,
  zoom: initialView.zoom
});

map.addControl(new maplibregl.NavigationControl(), 'top-right');

map.on('moveend', () => {
  updateUrlFromMap(map);
});

map.on('load', async () => {
  try {
    const files = [
      './krakow_mpzp_symbole_0_7000.geojson',
      './krakow_mpzp_symbole_7000_14000.geojson',
      './krakow_mpzp_symbole_14000_21000.geojson'
    ];

    const geojsonParts = await Promise.all(files.map(loadGeoJsonFile));

    const mergedGeojson = {
      type: 'FeatureCollection',
      features: geojsonParts.flatMap(part => part.features)
    };

    const filteredGeojson = {
      type: 'FeatureCollection',
      features: mergedGeojson.features.filter(feature => {
        const props = feature.properties || {};
        return props.rodzaj_ozn === 'W';
      })
    };

    map.addSource('symbole', {
      type: 'geojson',
      data: filteredGeojson
    });

    map.addLayer({
      id: 'fill',
      type: 'fill',
      source: 'symbole',
      paint: {
        'fill-color': '#4A90E2',
        'fill-opacity': 0.25
      }
    });

    map.addLayer({
      id: 'line',
      type: 'line',
      source: 'symbole',
      paint: {
        'line-color': '#1F4E79',
        'line-width': 1
      }
    });

    map.addLayer({
      id: 'labels',
      type: 'symbol',
      source: 'symbole',
      layout: {
        'text-field': ['get', 'rodzaj_ozn'],
        'text-size': 11,
        'text-anchor': 'center'
      },
      paint: {
        'text-color': '#111',
        'text-halo-color': '#ffffff',
        'text-halo-width': 1
      }
    });

    const bounds = new maplibregl.LngLatBounds();
    for (const feature of filteredGeojson.features) {
      if (feature.geometry && feature.geometry.coordinates) {
        addCoordsToBounds(feature.geometry.coordinates, bounds);
      }
    }

    const params = new URLSearchParams(window.location.search);
    const hasCustomView =
      params.has('lng') &&
      params.has('lat') &&
      params.has('z');

    if (!hasCustomView && !bounds.isEmpty()) {
      map.fitBounds(bounds, { padding: 30 });
    }

    map.on('click', 'fill', (e) => {
      const props = e.features[0].properties || {};
      let html = '';

      for (const [key, value] of Object.entries(props)) {
        html += `<div><b>${escapeHtml(key)}:</b> ${escapeHtml(value)}</div>`;
      }

      new maplibregl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(html)
        .addTo(map);
    });

    map.on('mouseenter', 'fill', () => {
      map.getCanvas().style.cursor = 'pointer';
    });

    map.on('mouseleave', 'fill', () => {
      map.getCanvas().style.cursor = '';
    });

    if (filteredGeojson.features.length === 0) {
      alert('Nie znaleziono obiektów z rodzaj_ozn = "W".');
    }

  } catch (err) {
    console.error('Dokładny błąd:', err);
    alert('Błąd: ' + err.message);
  }
});
</script>

</body>
</html>
